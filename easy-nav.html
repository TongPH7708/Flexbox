<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Nav</title>
</head>
<style>
body{
    margin: 0;
}

nav{
    display: flex;
    justify-content: space-between;
    width: 100%;
    background-color: #333;
}

nav a{
    padding: 15px;
    color: white;
    text-decoration: none;
}

</style>


<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Portfolio</a>
        <a href="#">Contract</a>
    </nav>
</body>
</html>
